services:
  api:
    build: .
    container_name: image-processing-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/image-processing-service
      JWT_SECRET: replace_this_with_a_long_secret
      JWT_EXPIRES_IN: 7d
      BASE_URL: http://localhost:5000
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: image-processing-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
  uploads-data: